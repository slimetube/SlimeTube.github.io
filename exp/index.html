<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Current Date & Time</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #f5f5f5;
    }
    #datetime {
      font-size: 1.5rem;
      color: #333;
      background: #fff;
      border-radius: 5px;
      padding: 1rem 2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      display: inline-block;
    }
  </style>
</head>
<body>
  <div id="datetime">May 9, 2006 11:45 AM</div>
  <script>
    function formatDate(date) {
      const options = {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
      };
      // Example: "Jul 9, 2025, 2:59 PM" -> "Jul 9, 2025 2:59 PM"
      return date.toLocaleString('en-US', options).replace(',', '');
    }

    function setCurrentDateTime() {
      try {
        const now = new Date();
        if (isNaN(now.getTime())) throw new Error('Invalid date');
        document.getElementById('datetime').textContent = formatDate(now);
      } catch (e) {
        // Fallback is already set as placeholder in HTML
      }
    }

    window.onload = setCurrentDateTime;
  </script>
</body>
</html>
