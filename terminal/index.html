<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Command Prompt</title>
  <style>
    @font-face {
      font-family: 'VGAFont';
      src: url('https://SlimeTube.github.io/vga.ttf') format('truetype');
    }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #000;
      font-family: 'VGAFont', monospace;
      color: white;
      overflow: hidden;
    }
    #container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      white-space: pre-wrap;
      background: rgba(0,0,0,0.5);
    }
    #input-container {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }
    #input-prompt { user-select: none; }
    #input {
      flex-grow: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-family: 'VGAFont', monospace;
      font-size: 16px;
    }
  </style>
</head>
<body>
<div id="container">
  <div id="terminal" tabindex="0"></div>
</div>
<div id="input-container">
  <span id="input-prompt">&gt; </span>
  <input id="input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" />
</div>

<script>
const terminal = document.getElementById('terminal');
const input = document.getElementById('input');
const prompt = '> ';
let history = [];
let historyIndex = -1;
const STORAGE_KEY = 'cmd_history';
const USERNAME_KEY = 'cmd_username';
let username = localStorage.getItem(USERNAME_KEY) || 'Guest';

const blockedWords = ['badword1', 'badword2'];

function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}
function loadHistory() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    history = JSON.parse(stored);
    historyIndex = history.length;
  }
}

function write(text, color) {
  const div = document.createElement('div');
  div.textContent = text;
  if (color) div.style.color = color;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

async function safeFetch(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Not OK');
    return res;
  } catch (e) {
    write(`${url} has failed to load because of a CORS error, terminating command.`, 'red');
    throw e;
  }
}

async function handle(cmd) {
  const parts = cmd.trim().split(' ');
  const c = parts[0].toLowerCase();
  try {
    if (c === 'clear') {
      terminal.innerHTML = '';
    } else if (c === 'help') {
      write(`Commands:
clear, help, swapbg, platform, useragent, speak, echo, curl, save,
date, github, youtube, ai, roblox, theme, googlefont, dump,
username <name>, littlecaesars`);
    } else if (c === 'swapbg') {
      const color = parts[1];
      const img = parts.slice(2).join(' ');
      if (color) document.body.style.backgroundColor = color;
      if (img) {
        document.body.style.backgroundImage = 'url("' + img + '")';
        document.body.style.backgroundSize = 'cover';
      } else {
        document.body.style.backgroundImage = '';
      }
      write(`BG updated: ${color || ''} ${img || ''}`);
    } else if (c === 'platform') {
      write(navigator.platform);
    } else if (c === 'useragent') {
      write(navigator.userAgent);
    } else if (c === 'speak') {
      const msg = parts.slice(1).join(' ');
      if (msg) {
        speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
        write(`Speaking: ${msg}`);
      } else write('Usage: speak [text]');
    } else if (c === 'echo') {
      write(parts.slice(1).join(' '));
    } else if (c === 'curl') {
      const url = parts[1];
      const download = parts[2]?.toLowerCase() === 'true';
      if (url) {
        const res = await safeFetch(url);
        const blob = await res.blob();
        if (download) {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = url.split('/').pop() || 'download';
          a.click();
          URL.revokeObjectURL(a.href);
          write(`Downloaded: ${a.download}`);
        } else {
          const text = await blob.text();
          write(text);
        }
      } else write('Usage: curl [url] [download true|false]');
    } else if (c === 'save') {
      const fileName = parts[1];
      const text = parts.slice(2).join(' ');
      if (fileName && text) {
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(a.href);
        write(`Saved file: ${fileName}`);
      } else {
        write('Usage: save [filename] [text]');
      }
    } else if (c === 'date') {
      write(new Date().toString());
    } else if (c === 'github') {
      const owner = parts[1];
      const repo = parts[2];
      if (owner && repo) {
        const res = await safeFetch(`https://api.github.com/repos/${owner}/${repo}`);
        const data = await res.json();
        write(`Name: ${data.full_name}
Description: ${data.description || 'No description'}
Stars: ${data.stargazers_count}
Forks: ${data.forks_count}
URL: ${data.html_url}`);
      } else {
        write('Usage: github [owner] [repo]');
      }
    } else if (c === 'youtube') {
      const videoId = parts[1];
      if (videoId) {
        const oEmbedRes = await safeFetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
        const data = await oEmbedRes.json();
        write(`Title: ${data.title}
Author: ${data.author_name}
Embed HTML:
${data.html}`);
      } else {
        write('Usage: youtube [video_id]');
      }
    } else if (c === 'ai') {
      const promptText = parts.slice(1).join(' ');
      if (promptText) {
        const res = await safeFetch(`https://text.pollinations.ai/${encodeURIComponent(promptText)}?private=true&model=mistral`);
        const data = await res.text();
        write(`AI: ${data}`);
      } else {
        write('Usage: ai [your text prompt]');
      }
    } else if (c === 'roblox') {
      const type = parts[1];
      if (type === 'user') {
        const username = parts[2];
        if (!username) return write('Usage: roblox user <username>');
        const res = await safeFetch('https://users.roproxy.com/v1/usernames/users');
        const data = await res.json();
        write(JSON.stringify(data));
      }
      // Add your other Roblox subcommands here...
    } else if (c === 'googlefont') {
      const fontName = parts.slice(1).join(' ');
      if (!fontName) return write('Usage: googlefont <Font+Name>');
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${fontName}&display=swap`;
      document.head.appendChild(link);
      terminal.style.fontFamily = `'${fontName.replace(/\+/g, ' ')}', sans-serif`;
      write(`Google Font applied: ${fontName}`);
    } else if (c === 'dump') {
      const lines = [];
      terminal.childNodes.forEach(node => {
        if (node.textContent) lines.push(node.textContent);
      });
      const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'terminal.pegx';
      a.click();
      URL.revokeObjectURL(a.href);
      write('Dumped terminal to terminal.pegx');
    } else if (c === 'theme') {
      const theme = parts[1]?.toLowerCase();
      if (theme === 'aero') {
        terminal.style.background = 'rgba(255, 255, 255, 0.2)';
        terminal.style.backdropFilter = 'blur(10px)';
        terminal.style.color = 'white';
        terminal.style.fontFamily = "'VGAFont', monospace";
        document.body.style.background = '#000';
        document.body.style.backgroundImage = '';
        write('Aero theme applied.');
      } else if (theme === 'adult') {
        terminal.style.background = 'black';
        terminal.style.textAlign = 'center';
        terminal.style.color = 'white';
        document.body.style.background = 'black';
        terminal.style.fontFamily = "'AdultFont', monospace";
        write('Adult theme applied.');
      } else if (theme === 'slime') {
        terminal.style.background = 'rgba(255, 255, 255, 0.2)';
        terminal.style.backdropFilter = 'blur(10px)';
        terminal.style.color = 'white';
        document.body.style.backgroundImage = 'url("https://pbs.twimg.com/media/FcZKJ0bXgAAPqDF?format=png")';
        document.body.style.backgroundSize = 'cover';
        terminal.style.fontFamily = "'SlimeFont', monospace";
        write('Slime theme applied.');
      } else {
        terminal.style.background = 'rgba(0, 0, 0, 0.5)';
        terminal.style.backdropFilter = 'none';
        terminal.style.color = 'white';
        terminal.style.fontFamily = "'VGAFont', monospace";
        document.body.style.background = '#000';
        document.body.style.backgroundImage = '';
        write('Default theme applied.');
      }
    } else if (c === 'username') {
      const newName = parts.slice(1).join(' ');
      if (!newName) return write('Usage: username <name>');
      for (let word of blockedWords) {
        if (newName.toLowerCase().includes(word)) {
          return write('Username contains blocked words!');
        }
      }
      username = newName;
      localStorage.setItem(USERNAME_KEY, username);
      write(`Username set to: ${username}`);
    } else if (c === 'littlecaesars') {
      const payload = {
        content: `Pizza Pizza! ${username} has activated the Little Caesars command on https://slimetube.github.io/terminal/`
      };
      await fetch('https://discord.com/api/webhooks/1393389311940100096/HZ2UJdrhl42KH36zt-w3HUF6jUPlSASDZBtxcpmiCVhhu6Mjy3yloWLG-9E4Aag78bCn', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      write(`Little Caesars command sent!`);
    } else {
      let r = eval(cmd);
      if (r instanceof Promise) r = await r;
      write(String(r));
    }
  } catch (err) {
    write(`Error: ${err.toString()}`);
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const cmd = input.value;
    write(prompt + cmd);
    if (cmd.trim()) {
      history.push(cmd);
      saveHistory();
    }
    historyIndex = history.length;
    handle(cmd);
    input.value = '';
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    if (history.length && historyIndex > 0) {
      historyIndex--;
      input.value = history[historyIndex];
    }
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    if (history.length && historyIndex < history.length - 1) {
      historyIndex++;
      input.value = history[historyIndex];
    } else {
      historyIndex = history.length;
      input.value = '';
    }
    e.preventDefault();
  }
});

terminal.addEventListener('wheel', e => e.preventDefault(), { passive: false });
window.addEventListener('scroll', () => window.scrollTo(0, 0));

input.addEventListener('paste', e => {
  e.preventDefault();
  const text = e.clipboardData.getData('text');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = input.value.slice(0, start) + text + input.value.slice(end);
  input.selectionStart = input.selectionEnd = start + text.length;
});

window.onerror = () => {
  terminal.innerHTML = '';
  document.body.style.background = '#0000AA';
  terminal.style.color = '#fff';
  terminal.textContent = `
A problem has been detected and Windows has been shut down to prevent damage to your computer.

ERROR_EXCEPTION_JAVA

If this is the first time you've seen this error screen, restart your computer. If this screen appears again, follow these steps:

Check to make sure any new hardware or software is properly installed. If this is a new installation, ask your hardware or software manufacturer for any Windows updates you might need.

If problems continue, disable or remove any newly installed hardware or software. Disable BIOS memory options such as caching or shadowing. If you need to use Safe Mode to remove or disable components, restart your computer, press F8 to select Advanced Startup Options, and then select Safe Mode.

Technical Information:

*** STOP: 0x000000ED (0x80F128D0, 0x0000009c, 0x00000000, 0x0000000)

Collecting data for crash dump ...
Initializing disk for crash dump ...`;
};

loadHistory();
write(`Welcome ${username}! Type "help" for commands.`);
input.focus();
</script>
</body>
</html>
