<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Command Prompt</title>
  <style>
    @font-face {
      font-family: 'VGAFont';
      src: url('https://SlimeTube.github.io/vga.ttf') format('truetype');
    }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #000;
      font-family: 'VGAFont', monospace;
      color: white;
      overflow: hidden;
    }
    #container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      white-space: pre-wrap;
      background: rgba(0,0,0,0.5);
    }
    #input-container {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }
    #input-prompt { user-select: none; }
    #input {
      flex-grow: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-family: 'VGAFont', monospace;
      font-size: 16px;
    }
  </style>
</head>
<body>
<div id="container">
  <div id="terminal" tabindex="0"></div>
</div>
<div id="input-container">
  <span id="input-prompt">&gt; </span>
  <input id="input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" />
</div>

<script>
const terminal = document.getElementById('terminal');
const input = document.getElementById('input');
const prompt = '> ';
let history = [];
let historyIndex = -1;
const STORAGE_KEY = 'cmd_history';
const USERNAME_KEY = 'cmd_username';
let username = localStorage.getItem(USERNAME_KEY) || 'Guest';

// Blocked words for username + dscrd
const blockedWords = [
  'nigger', 'asshole', 'fuck', 'shit', 'bitch', 'slut', 'cunt', 
  'dick', 'pussy', 'cock', 'rape', 'porn', 'sex'
];

function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}
function loadHistory() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    history = JSON.parse(stored);
    historyIndex = history.length;
  }
}

function write(text, color) {
  if (text === undefined) return;
  const div = document.createElement('div');
  div.textContent = text;
  if (color) div.style.color = color;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

async function safeFetch(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Not OK');
    return res;
  } catch (e) {
    write(`${url} has failed to load because of a CORS error, terminating command.`, 'red');
    throw e;
  }
}

async function handle(cmd) {
  const parts = cmd.trim().split(' ');
  const c = parts[0].toLowerCase();
  try {
    if (c === 'clear') {
      terminal.innerHTML = '';
    } else if (c === 'help') {
      write(`Commands:
clear, help, dump, username <name>, littlecaesars, pizz-zza, dscrd <msg>,
roblox [group|place] <id>`);
    } else if (c === 'dump') {
      let all = '';
      terminal.querySelectorAll('div').forEach(div => {
        all += div.textContent + '\n';
      });
      const blob = new Blob([all], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'dump.pegx';
      a.click();
      URL.revokeObjectURL(a.href);
      write('Dump saved as dump.pegx');
    } else if (c === 'username') {
      const newName = parts.slice(1).join(' ');
      if (!newName) return write('Usage: username <name>');
      for (let word of blockedWords) {
        if (newName.toLowerCase().includes(word)) {
          return write('Username contains blocked words!');
        }
      }
      username = newName;
      localStorage.setItem(USERNAME_KEY, username);
      write(`Username set to: ${username}`);
    } else if (c === 'littlecaesars' || c === 'pizz-zza') {
      write('Pizza Pizza!');
      const payload = {
        content: `Pizza Pizza! ${username} has activated the Little Caesars command on https://slimetube.github.io/terminal/`
      };
      await fetch('https://discord.com/api/webhooks/1393389311940100096/HZ2UJdrhl42KH36zt-w3HUF6jUPlSASDZBtxcpmiCVhhu6Mjy3yloWLG-9E4Aag78bCn', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      write('Little Caesars command sent!');
    } else if (c === 'dscrd') {
      const message = parts.slice(1).join(' ');
      if (!message) return write('Usage: dscrd <message>');
      for (let word of blockedWords) {
        if (message.toLowerCase().includes(word)) {
          return write('Message contains blocked words!');
        }
      }
      await fetch('https://discord.com/api/webhooks/1393396765012660224/weXmVY6hr6lu25FmDQnmmLSvjEcqnWH6LKGzku-aBI32C3uflaH7eu4sbICNv78HCVN-', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ content: `[${username}]: ${message}` })
      });
      write('Message sent to Discord!');
    } else if (c === 'roblox') {
      const type = parts[1];
      const value = parts[2];
      if (!type || !value) return write('Usage: roblox [group|place] <id>');
      if (type === 'group') {
        const res = await safeFetch(`https://groups.roproxy.com/v1/groups/${value}`);
        const data = await res.json();
        write(`Group: ${data.name}
Owner: ${data.owner ? data.owner.username : 'N/A'}
Members: ${data.memberCount}`);
      } else if (type === 'place') {
        const res = await safeFetch(`https://games.roproxy.com/v1/games?universeIds=${value}`);
        const data = await res.json();
        if (data.data && data.data[0]) {
          const g = data.data[0];
          write(`Place: ${g.name}
Creator: ${g.creator.name}
Visits: ${g.visits}`);
        } else {
          write('Place not found.');
        }
      } else {
        write('Usage: roblox [group|place] <id>');
      }
    } else {
      let r = eval(cmd);
      if (r instanceof Promise) r = await r;
      write(r);
    }
  } catch (err) {
    write(`Error: ${err.toString()}`);
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const cmd = input.value;
    write(prompt + cmd);
    if (cmd.trim()) {
      history.push(cmd);
      saveHistory();
    }
    historyIndex = history.length;
    handle(cmd);
    input.value = '';
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    if (history.length && historyIndex > 0) {
      historyIndex--;
      input.value = history[historyIndex];
    }
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    if (history.length && historyIndex < history.length - 1) {
      historyIndex++;
      input.value = history[historyIndex];
    } else {
      historyIndex = history.length;
      input.value = '';
    }
    e.preventDefault();
  }
});

terminal.addEventListener('wheel', e => e.preventDefault(), { passive: false });
window.addEventListener('scroll', () => window.scrollTo(0, 0));

input.addEventListener('paste', e => {
  e.preventDefault();
  const text = e.clipboardData.getData('text');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = input.value.slice(0, start) + text + input.value.slice(end);
  input.selectionStart = input.selectionEnd = start + text.length;
});

window.onerror = () => {
  terminal.innerHTML = '';
  document.body.style.background = '#0000AA';
  terminal.style.color = '#fff';
  terminal.textContent = `
A problem has been detected and Windows has been shut down to prevent damage to your computer.

ERROR_EXCEPTION_JAVA

If this is the first time you've seen this error screen, restart your computer. If this screen appears again, follow these steps:

Check to make sure any new hardware or software is properly installed. If this is a new installation, ask your hardware or software manufacturer for any Windows updates you might need.

If problems continue, disable or remove any newly installed hardware or software. Disable BIOS memory options such as caching or shadowing. If you need to use Safe Mode to remove or disable components, restart your computer, press F8 to select Advanced Startup Options, and then select Safe Mode.

Technical Information:

*** STOP: 0x000000ED (0x80F128D0, 0x0000009c, 0x00000000, 0x0000000)

Collecting data for crash dump ...
Initializing disk for crash dump ...`;
};

loadHistory();
write(`Welcome ${username}! Type "help" for commands.`);
input.focus();
</script>
</body>
</html>
