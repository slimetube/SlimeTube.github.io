<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Command Prompt</title>
  <style>
    @font-face {
      font-family: 'VGAFont';
      src: url('https://SlimeTube.github.io/vga.ttf') format('truetype');
    }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #000;
      font-family: 'VGAFont', monospace;
      color: white;
      overflow: hidden;
    }
    #container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      white-space: pre-wrap;
      background: rgba(0,0,0,0.5);
    }
    #input-container {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }
    #input-prompt { user-select: none; }
    #input {
      flex-grow: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-family: 'VGAFont', monospace;
      font-size: 16px;
    }
  </style>
</head>
<body>
<div id="container">
  <div id="terminal" tabindex="0"></div>
</div>
<div id="input-container">
  <span id="input-prompt">&gt; </span>
  <input id="input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" />
</div>

<script>
const terminal = document.getElementById('terminal');
const input = document.getElementById('input');
let history = [];
let historyIndex = -1;
const STORAGE_KEY = 'cmd_history';
const USERNAME_KEY = 'cmd_username';
let username = localStorage.getItem(USERNAME_KEY) || 'Guest';

const blockedWords = [
  'nigger', 'nigga','asshole','fuck','shit','bitch','slut','cunt',
  'dick','pussy','cock','rape','porn','sex','anus'
];

const nsfwDomains = [
  'rule34', 'porn', 'sex', 'hentai', 'xxx', 'adult', 'erotic', 'fetish',
  'xvideos', 'xhamster', 'youporn', 'redtube', 'spankbang', 'pornhub'
];

function isNsfwUrl(url) {
  const lower = url.toLowerCase();
  return nsfwDomains.some(domain => lower.includes(domain));
}

async function setWebhookPfp(url) {
  if (!url) return write('Usage: webhookpfp <image_url>');
  if (isNsfwUrl(url)) {
    write('Blocked: NSFW or sexual image URLs are not allowed!', 'red');
    return;
  }
  const payload = { avatar_url: url };
  try {
    await fetch('https://discord.com/api/webhooks/1393389311940100096/HZ2UJdrhl42KH36zt-w3HUF6jUPlSASDZBtxcpmiCVhhu6Mjy3yloWLG-9E4Aag78bCn', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    await fetch('https://discord.com/api/webhooks/1393396765012660224/weXmVY6hr6lu25FmDQnmmLSvjEcqnWH6LKGzku-aBI32C3uflaH7eu4sbICNv78HCVN-', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    write('Webhook profile pictures updated!');
  } catch {
    write('Failed to update webhook profile pictures.', 'red');
  }
}

function saveHistory() { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); }
function loadHistory() { const h = localStorage.getItem(STORAGE_KEY); if (h) { history = JSON.parse(h); historyIndex = history.length; } }
function write(text, color) { if (text === undefined) return; const div = document.createElement('div'); div.textContent = text; if (color) div.style.color = color; terminal.appendChild(div); terminal.scrollTop = terminal.scrollHeight; }

async function safeFetch(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Not OK');
    return res;
  } catch {
    write(`${url} has failed to load because of a CORS error, terminating command.`, 'red');
    throw new Error('CORS');
  }
}

async function handle(cmd) {
  const parts = cmd.trim().split(' ');
  const c = parts[0].toLowerCase();
  try {
    if (c === 'clear') {
      terminal.innerHTML = '';
    } else if (c === 'help') {
      write(`Commands: clear, help, echo, curl, swapbg, fontswap, theme, speak, platform, useragent, date, username <name>, littlecaesars/pizz-zza, dscrd <msg>, roblox [group|place] <id>, dump, ai <text>, youtube <url>, webhookpfp <url>`);
    } else if (c === 'echo') {
      write(parts.slice(1).join(' '));
    } else if (c === 'curl') {
      const url = parts[1]; if (!url) return write('Usage: curl <url>');
      const res = await safeFetch(url); const text = await res.text();
      write(text);
    } else if (c === 'swapbg') {
      const color = parts[1]; const img = parts[2];
      document.body.style.backgroundColor = color || '';
      document.body.style.backgroundImage = img ? `url(${img})` : '';
    } else if (c === 'fontswap') {
      const url = parts[1]; if (!url) return write('Usage: fontswap <url>');
      const name = url.split('/').pop().split('.')[0];
      const style = document.createElement('style');
      style.textContent = `@font-face { font-family: '${name}'; src: url('${url}'); } body, input { font-family: '${name}', monospace; }`;
      document.head.appendChild(style);
      write(`Font set to ${name}`);
    } else if (c === 'theme') {
      const theme = parts[1];
      if (theme === 'aero') {
        document.body.style.backgroundColor = '#000'; terminal.style.background = 'rgba(0,0,0,0.5)';
      } else if (theme === 'adult') {
        document.body.style.backgroundColor = '#000'; document.body.style.color = '#fff'; terminal.style.textAlign = 'center';
        const style = document.createElement('style');
        style.textContent = `@font-face { font-family: 'HelveticaNeue'; src: url('https://file.garden/Z3HtEpAjyGTEZiXW/HelveticaNeue-CondensedBold.ttf'); } body,input { font-family: 'HelveticaNeue'; }`;
        document.head.appendChild(style);
      } else if (theme === 'slime') {
        document.body.style.backgroundImage = 'url(https://pbs.twimg.com/media/FcZKJ0bXgAAPqDF?format=png)';
        const style = document.createElement('style');
        style.textContent = `@font-face { font-family: 'DroidSans'; src: url('https://slimetube.github.io/droidsans.ttf'); } body,input { font-family: 'DroidSans'; }`;
        document.head.appendChild(style);
      }
      write(`Theme ${theme} applied`);
    } else if (c === 'speak') {
      const text = parts.slice(1).join(' '); if (!text) return write('Usage: speak <text>');
      const utterance = new SpeechSynthesisUtterance(text); speechSynthesis.speak(utterance);
    } else if (c === 'platform') { write(navigator.platform); }
    else if (c === 'useragent') { write(navigator.userAgent); }
    else if (c === 'date') { write(new Date().toString()); }
    else if (c === 'username') {
      const newName = parts.slice(1).join(' ');
      for (let word of blockedWords) if (newName.toLowerCase().includes(word)) return write('Username blocked!');
      username = newName; localStorage.setItem(USERNAME_KEY, username); write(`Username set: ${username}`);
    } else if (c === 'littlecaesars' || c === 'pizz-zza') {
      write('Pizza Pizza!');
      await fetch('https://discord.com/api/webhooks/1393389311940100096/HZ2UJdrhl42KH36zt-w3HUF6jUPlSASDZBtxcpmiCVhhu6Mjy3yloWLG-9E4Aag78bCn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:`Pizza Pizza! ${username} has activated Little Caesars on https://slimetube.github.io/terminal/`})});
    } else if (c === 'dscrd') {
      const message = parts.slice(1).join(' ');
      for (let word of blockedWords) if (message.toLowerCase().includes(word)) return write('Blocked words!');
      await fetch('https://discord.com/api/webhooks/1393396765012660224/weXmVY6hr6lu25FmDQnmmLSvjEcqnWH6LKGzku-aBI32C3uflaH7eu4sbICNv78HCVN-', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({content:message, username:username})
      });
      write('Sent!');
    } else if (c === 'webhookpfp') {
      await setWebhookPfp(parts[1]);
    } else {
      write('Unknown command.');
    }
  } catch (err) { write(`Error: ${err}`); }
}

input.addEventListener('keydown', e => { if (e.key==='Enter'){const c=input.value;write('> '+c);history.push(c);saveHistory();historyIndex=history.length;handle(c);input.value='';} if(e.key==='ArrowUp'){if(history.length&&historyIndex>0){historyIndex--;input.value=history[historyIndex];}} if(e.key==='ArrowDown'){if(history.length&&historyIndex<history.length-1){historyIndex++;input.value=history[historyIndex];}else{historyIndex=history.length;input.value='';}} });
terminal.addEventListener('wheel', e => e.preventDefault(), { passive:false });
window.addEventListener('scroll',()=>window.scrollTo(0,0));
input.addEventListener('paste',e=>{e.preventDefault();const t=e.clipboardData.getData('text');const s=input.selectionStart;input.value=input.value.slice(0,s)+t+input.value.slice(input.selectionEnd);input.selectionStart=input.selectionEnd=s+t.length;});
window.onerror=()=>{terminal.innerHTML='';document.body.style.background='#00F';terminal.style.color='#FFF';terminal.textContent=`A problem has been detected and Windows has been shut down to prevent damage to your computer.\n\nERROR_EXCEPTION_JAVA\n\n*** STOP: 0x000000ED ...\nCollecting data for crash dump ...\nInitializing disk for crash dump ...`;};
loadHistory(); write(`Welcome ${username}! Type "help" for commands.`); input.focus();
</script>
</body>
</html>
