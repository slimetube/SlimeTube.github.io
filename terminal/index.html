<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Custom Command Prompt</title>

  <style>
    @font-face {
      font-family: 'VGAFont';
      src: url('https://SlimeTube.github.io/vga.ttf') format('truetype');
    }

    html, body {
      margin: 0; padding: 0; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'VGAFont', monospace;
      color: white;
    }

    #container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #terminal {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 20px;
      white-space: pre-wrap;
      opacity: 0.5; /* ✅ Makes the terminal semi-transparent */
    }

    .input-line { display: inline; }

    .cursor {
      display: inline-block;
      width: 10px;
      background: currentColor;
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink { to { visibility: hidden; } }
  </style>
</head>
<body>
  <div id="container">
    <div id="terminal" tabindex="0"></div>
  </div>

  <script>
    const terminal = document.getElementById('terminal');
    const prompt = '> ';
    let input = [];
    let cursorPos = 0;
    let history = [];
    let historyIndex = -1;
    const STORAGE_KEY = 'cmd_history';

    const sentinel = document.createElement('div');
    terminal.appendChild(sentinel);

    function scrollToBottom() {
      requestAnimationFrame(() => {
        sentinel.scrollIntoView({ block: 'end' });
      });
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function render() {
      const old = terminal.querySelector('.input-line');
      if (old) old.remove();
      const before = input.slice(0, cursorPos).join('');
      const atCursor = input[cursorPos] || ' ';
      const after = input.slice(cursorPos + 1).join('');
      const span = document.createElement('span');
      span.className = 'input-line';
      span.innerHTML = `${prompt}${escapeHtml(before)}<span class="cursor">${escapeHtml(atCursor)}</span>${escapeHtml(after)}`;
      terminal.insertBefore(span, sentinel);
      scrollToBottom();
    }

    function write(text) {
      sentinel.insertAdjacentHTML('beforebegin', text);
      scrollToBottom();
    }

    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function loadHistory() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        history = JSON.parse(stored);
        historyIndex = history.length;
      }
    }

    async function handle(cmd) {
      const parts = cmd.trim().split(' ');
      const c = parts[0].toLowerCase();

      try {
        if (c === 'clear') {
          terminal.innerHTML = '';
          terminal.appendChild(sentinel);
        } else if (c === 'help') {
          write('\nCommands: clear, help, swapbg [color] [url], platform, useragent, speak [text], echo [text], curl [url], date\n');
        } else if (c === 'swapbg') {
          const color = parts[1], img = parts[2];
          if (color) document.body.style.backgroundColor = color;
          if (img) {
            document.body.style.backgroundImage = `url(${img})`;
            document.body.style.backgroundSize = 'cover';
          }
          write(`\nBG updated: ${color || ''} ${img || ''}\n`);
        } else if (c === 'platform') {
          write(`\n${navigator.platform}\n`);
        } else if (c === 'useragent') {
          write(`\n${navigator.userAgent}\n`);
        } else if (c === 'speak') {
          const msg = parts.slice(1).join(' ');
          if (msg) {
            speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
            write(`\nSpeaking: ${msg}\n`);
          } else write('\nUsage: speak [text]\n');
        } else if (c === 'echo') {
          write(`\n${parts.slice(1).join(' ')}\n`);
        } else if (c === 'curl') {
          const url = parts[1];
          if (url) {
            try {
              const res = await fetch(url);
              const t = await res.text();
              write(`\n${escapeHtml(t)}\n`);
            } catch (err) {
              write(`\nError: ${escapeHtml(err.toString())}\n`);
            }
          } else write('\nUsage: curl [url]\n');
        } else if (c === 'date') {
          write(`\n${new Date().toString()}\n`);
        } else {
          let r = eval(cmd);
          if (r instanceof Promise) r = await r;
          write(`\n${escapeHtml(String(r))}\n`);
        }
      } catch (err) {
        write(`\nError: ${escapeHtml(err.toString())}\n`);
      }
    }

    terminal.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
      if (e.key === 'Backspace') {
        if (cursorPos > 0) { input.splice(cursorPos - 1, 1); cursorPos--; }
      } else if (e.key === 'Delete') {
        if (cursorPos < input.length) input.splice(cursorPos, 1);
      } else if (e.key === 'ArrowLeft') {
        if (cursorPos > 0) cursorPos--;
      } else if (e.key === 'ArrowRight') {
        if (cursorPos < input.length) cursorPos++;
      } else if (e.key === 'ArrowUp') {
        if (history.length) { historyIndex = Math.max(0, historyIndex - 1); input = history[historyIndex].split(''); cursorPos = input.length; }
      } else if (e.key === 'ArrowDown') {
        if (history.length) { historyIndex = Math.min(history.length, historyIndex + 1); input = historyIndex === history.length ? [] : history[historyIndex].split(''); cursorPos = input.length; }
      } else if (e.key === 'Enter') {
        const cmd = input.join('');
        write(`\n${prompt}${escapeHtml(cmd)}\n`);
        if (cmd.trim()) { history.push(cmd); saveHistory(); }
        historyIndex = history.length;
        handle(cmd);
        input = []; cursorPos = 0;
      } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        input.splice(cursorPos, 0, e.key);
        cursorPos++;
      }
      render();
    });

    terminal.addEventListener('paste', e => {
      e.preventDefault();
      for (const c of e.clipboardData.getData('text')) {
        input.splice(cursorPos, 0, c);
        cursorPos++;
      }
      render();
    });

    terminal.addEventListener('mousedown', () => terminal.focus());
    window.addEventListener('focus', () => setTimeout(() => terminal.focus(), 100));

    window.onerror = () => {
      terminal.innerHTML = '';
      document.body.style.background = '#0000AA';
      terminal.textContent = `
A problem has been detected and Windows has been shut down to prevent damage to your computer.

ERROR_EXCEPTION_JAVA

If this is the first time you've seen this error screen, restart your computer. If this screen appears again, follow these steps:

Check to make sure any new hardware or software is properly installed. If this is a new installation, ask your hardware or software manufacturer for any Windows updates you might need.

If problems continue, disable or remove any newly installed hardware or software. Disable BIOS memory options such as caching or shadowing. If you need to use Safe Mode to remove or disable components, restart your computer, press F8 to select Advanced Startup Options, and then select Safe Mode.

Technical Information:

*** STOP: 0x000000ED (0x80F128D0, 0x0000009c, 0x0000000, 0x0000000)

Collecting data for crash dump ...
Initializing disk for crash dump ...`;
    };

    loadHistory();
    write('Custom Command Prompt\nType "help" for commands.\n\n');
    render();
    terminal.focus();
  </script>
</body>
</html>
